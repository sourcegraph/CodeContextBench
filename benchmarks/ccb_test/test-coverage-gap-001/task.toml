version = "1.0"

[metadata]
name = "test-coverage-gap-001"
description = "Analyze test coverage gaps in Envoy's HTTP connection manager filter chain"
license = "Apache-2.0"

[task]
id = "test-coverage-gap-001"
repo = "envoyproxy/envoy"
category = "test-coverage-gap-analysis"
language = "cpp"
difficulty = "hard"
time_limit_sec = 1800

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: gap identification precision (0.40) + proposed test case feasibility (0.30) + code reference accuracy (0.30)"

[environment]
build_timeout_sec = 1800.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'EOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
EOF
fi
exit 0
"""
