version = "1.0"

[metadata]
name = "test-unitgen-go-001"
description = "Generate unit tests for the k8s.io/apiserver/pkg/storage/value package in kubernetes/kubernetes"
license = "Apache-2.0"

[task]
id = "test-unitgen-go-001"
repo = "kubernetes/kubernetes"
category = "unit-test-generation"
language = "go"
difficulty = "hard"
time_limit_sec = 1800

[verification]
type = "test"
command = "bash /tests/test.sh"
reward_type = "checklist"
description = "Weighted checklist: test file presence (0.25) + test function coverage (0.40) + edge case detection (0.20) + table-driven test pattern (0.15)"

[environment]
build_timeout_sec = 1800.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude
  cat > /root/.config/claude/mcp.json << 'MCPEOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
MCPEOF
  echo "OK MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
