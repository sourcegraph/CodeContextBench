version = "1.0"
[metadata]
name = "envoy-dfp-host-leak-fix-001"
description = "Fixes memory leak in dynamic forward proxy cluster when DNS re-resolves to new IP (#31433)"
license = "Apache-2.0"

[task]
id = "envoy-dfp-host-leak-fix-001"
repo = "envoyproxy/envoy"
category = "cross_module_bug_fix"
language = "cpp"
pre_fix_rev = "5160151e14837c6f352b9d0b3a9f55119a9317e8"
ground_truth_rev = "f20b6ca6b3cd1b3f2577d495e939831019d9a86d"
difficulty = "hard"
time_limit_sec = 900

[verification]
type = "test"
command = "bash /tests/test.sh"

reward_type = "diff_similarity"
description = "Similarity between agent diff and expected ground-truth diff"
[environment]
build_timeout_sec = 1800.0

[environment.setup_scripts]
mcp_config = """#!/bin/bash
# Setup Sourcegraph MCP if credentials provided
if [ -n "$SOURCEGRAPH_ACCESS_TOKEN" ] && [ -n "$SOURCEGRAPH_URL" ]; then
  echo "Setting up Sourcegraph MCP configuration..."
  mkdir -p /root/.config/claude

  cat > /root/.config/claude/mcp.json << 'EOF'
{
  "mcpServers": {
    "sourcegraph": {
      "command": "npx",
      "args": ["-y", "@sourcegraph/mcp-server"],
      "env": {
        "SRC_ACCESS_TOKEN": "$SOURCEGRAPH_ACCESS_TOKEN",
        "SOURCEGRAPH_URL": "$SOURCEGRAPH_URL"
      }
    }
  }
}
EOF

  echo "PASS MCP configuration created"
else
  echo "No Sourcegraph credentials provided, MCP disabled"
fi
exit 0
"""
